          image: tencentcom/git-sync
          imports: https://cnb.cool/liyao52033/envs/-/blob/main/github-env.yml
          settings:
            target_url: https://github.com/liyao52033/hugo-site.git
            git_user: ${GIT_USERNAME}
            git_email: ${GIT_EMAIL}
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}

