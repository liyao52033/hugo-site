    [params.social]
        github = "liyao52033/hugopress"        
        rss = true                    # show rss icon with link     
        
    [params.blogger]
      avatar = "https://img.xiaoying.org.cn/img/20250725164502996.png"
      backgroundImage = "https://img.xxdevops.cn/blog/wallpaper/bg14.avif"  # 博主卡片背景图（可选，留空则使用纯色背景）
